<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEEMO PICTURE</title>

  <style>
    body{
      margin:0;
      background:#0b0b0b;
      color:white;
      font-family:Arial;
    }

    header{
      padding:20px;
      text-align:center;
      border-bottom:1px solid #222;
    }

    h1{
      letter-spacing:3px;
    }

    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero h2{
      font-size:40px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#151515;
      border-radius:10px;
      overflow:hidden;
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:white;
      color:black;
      cursor:pointer;
      font-weight:bold;
      margin-top:10px;
    }

    .pricing{
      text-align:center;
      padding:40px 20px;
    }

    .pricing-box{
      background:#151515;
      padding:30px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
    }
  </style>
</head>

<body>

<header>
  <h1>VEEMO PICTURE</h1>
</header>

<section class="hero">
  <h2>Premium African Images</h2>
  <p>Découvrez des images professionnelles uniques.</p>
</section>

<section class="gallery">
<div class="card">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" />

  <div class="card-content">
    <h3>Nature Premium</h3>
    <p>14$</p>

    <a href="https://wa.me/243994234207?text=Bonjour%20je%20veux%20acheter%20l'image%20Nature%20Premium%20à%2014$"
       target="_blank"
       style="display:block;background:white;color:black;text-align:center;padding:12px;border-radius:6px;text-decoration:none;font-weight:bold;">
       📲 Acheter sur WhatsApp
    </a>

  </div>
</div>
</section>

<section class="pricing">
  <div class="pricing-box">
    <h2>Abonnement Premium</h2>
    <p>Accès illimité aux images</p>
    <h3>350$/mois</h3>
    <button>S'abonner</button>
  </div>
</section>

</body>
</html>
