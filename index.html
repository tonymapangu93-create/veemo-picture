<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEEMO PICTURE</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial, sans-serif;
color:white;
}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #222;
}

.hero{
text-align:center;
padding:50px 20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
display:block;
}

.card-content{
padding:15px;
}

.buy-btn{
display:block;
background:white;
color:black;
text-align:center;
padding:12px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}

.pricing{
padding:60px 20px;
display:flex;
justify-content:center;
}

.pricing-box{
background:#151515;
padding:30px;
border-radius:10px;
max-width:400px;
width:100%;
text-align:center;
}

.pricing-box button{
background:white;
color:black;
border:none;
padding:12px 20px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<header>
<h1>VEEMO PICTURE</h1>
</header>

<section class="hero">
<h2>Premium African Images</h2>
<p>Découvrez des images professionnelles uniques.</p>
</section>

<section class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h3>Nature Premium</h3>
<p>14$</p>

<a class="buy-btn"
href="https://wa.me/243994234207"
target="_blank">
🛒 Acheter sur WhatsApp
</a>

</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h3>Urban Lifestyle</h3>
<p>20$</p>

<a class="buy-btn"
href="https://wa.me/243994234207"
target="_blank">
🛒 Acheter sur WhatsApp
</a>

</div>
</div>

</section>

<section class="pricing">

<div class="pricing-box">

<h2>Abonnement Premium</h2>

<p>Accès illimité aux images premium</p>

<h3>350$/mois</h3>

<button>S'abonner</button>

</div>

</section>

</body>
</html>
